# ──────────────────────────────────────────────
# neli.tr  →  Vite SPA + Hono API (port 3001)
# ──────────────────────────────────────────────

server {
    listen 80;
    server_name neli.tr www.neli.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name neli.tr www.neli.tr;

    ssl_certificate /etc/letsencrypt/live/neli.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neli.tr/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/nelimuhendislik/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SEO: sitemap & robots proxy to backend
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # API proxy to Hono backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # Uploaded media files
    location /uploads/ {
        alias /var/www/nelimuhendislik/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ──────────────────────────────────────────────
# neli.net.tr  →  Odoo (port 8069)
# ──────────────────────────────────────────────

server {
    listen 80;
    server_name neli.net.tr www.neli.net.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name neli.net.tr www.neli.net.tr;

    ssl_certificate /etc/letsencrypt/live/neli.net.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neli.net.tr/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:8069;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        client_max_body_size 50M;
    }

    location /longpolling/ {
        proxy_pass http://127.0.0.1:8072;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
