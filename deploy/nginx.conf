server {
    listen 80;
    server_name neli.tr www.neli.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name neli.tr www.neli.tr;

    ssl_certificate /etc/letsencrypt/live/neli.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neli.tr/privkey.pem;

    root /var/www/nelimuhendislik/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy to Hono backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For file uploads
        client_max_body_size 20M;
    }

    # Uploaded media files
    location /uploads/ {
        alias /var/www/nelimuhendislik/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback - all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
